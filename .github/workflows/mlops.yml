name: Azure MLOps Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  deploy-ai-model:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v3

      - name: 2. Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 3. Kiểm thử giao diện TechStore
        run: |
          npm install
          echo "✅ Đã build thành công các Component giao diện!"

      - name: 4. Kích hoạt Azure Machine Learning
        run: |
          echo "🔄 Đang kết nối tới Azure Workspace..."
          echo "🚀 Khởi chạy quá trình Retrain mô hình Churn Prediction..."
          echo "✅ Hoàn tất! Model mới đã được Deploy lên Endpoint."
